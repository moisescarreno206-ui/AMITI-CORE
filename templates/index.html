<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; background: #000; color: #0ff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; padding: 20px; overflow-y: auto; border: 2px solid #f0f; box-shadow: 0 0 10px #f0f; }
        .mensaje { margin-bottom: 10px; padding: 10px; border-radius: 15px; background: #111; }
        .yo { text-align: right; color: #fff; }
        .amiti { text-align: left; color: #0ff; }
        #inputArea { display: flex; padding: 10px; background: #111; }
        input { flex: 1; padding: 15px; border-radius: 20px; border: 1px solid #0ff; background: #000; color: #0ff; }
    </style>
</head>
<body>
    <div id="chat"><div class="mensaje amiti">AMITI: Sistema activo. ¿Qué deseas, Moisés?</div></div>
    <div id="inputArea">
        <input type="text" id="userInput" placeholder="Escribe mensaje...">
        <button onclick="enviar()">Enviar</button>
    </div>
    <script>
        async function enviar() {
            let input = document.getElementById('userInput');
            let chat = document.getElementById('chat');
            let msg = input.value;
            chat.innerHTML += `<div class="mensaje yo">Tú: ${msg}</div>`;
            
            let res = await fetch(`/procesar?comando=${encodeURIComponent(msg)}`);
            let data = await res.json();
            
            chat.innerHTML += `<div class="mensaje amiti">AMITI: ${data.respuesta}</div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
