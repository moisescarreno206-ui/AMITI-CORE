<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #050505; color: #00f2ff; font-family: sans-serif; display: flex; justify-content: center; height: 100vh; margin: 0; }
        .chat-box { width: 100%; max-width: 400px; display: flex; flex-direction: column; padding: 20px; }
        #mensajes { flex-grow: 1; border: 2px solid #ff00ff; border-radius: 20px; padding: 15px; margin-bottom: 10px; overflow-y: auto; }
        input { background: #1a1a1a; border: 1px solid #00f2ff; color: white; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="chat-box">
        <div id="mensajes">AMITI: Sistema Online. Escribe algo...</div>
        <input type="text" id="userInput" placeholder="Escribe a AMITI...">
    </div>
    <script>
        document.getElementById('userInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                let msg = this.value;
                document.getElementById('mensajes').innerHTML += `<p>Tú: ${msg}</p>`;
                // Aquí conectaríamos con el backend
                this.value = '';
            }
        });
    </script>
</body>
</html>
